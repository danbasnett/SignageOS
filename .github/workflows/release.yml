name: Release SignageOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Package and Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Substitute placeholders
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          REPO="${{ github.repository }}"
          sed -i "s|@@VERSION@@|${VERSION}|g;s|@@GITHUB_REPO@@|${REPO}|g" install.sh
          sed -i "s|@@GITHUB_REPO@@|${REPO}|g" rootfs/usr/bin/signaeos-update

      - name: Install web UI npm deps
        run: |
          cd rootfs/usr/share/signaeos/webui
          npm install --production --no-audit --no-fund

      - name: Package signaeos-files.tar.gz
        run: |
          tar -czf signaeos-files.tar.gz -C rootfs .
          ls -lh signaeos-files.tar.gz

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: SignageOS v${{ steps.ver.outputs.version }}
          body: |
            ## SignageOS v${{ steps.ver.outputs.version }}

            ### Install on Raspberry Pi OS Lite

            SSH into your Pi and run:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/v${{ steps.ver.outputs.version }}/install.sh | sudo bash
            ```

            Or download and run manually:
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.ver.outputs.version }}/install.sh
            sudo bash install.sh
            ```

            **Requires:** Raspberry Pi OS Lite (Bookworm) or Debian Bookworm x86_64

            ### After install
            Browse to **http://signaeos.local:3000**

            ### Update existing install
            ```bash
            sudo signaeos-update apply
            ```
          files: |
            install.sh
            signaeos-files.tar.gz
          draft: false
          prerelease: false
