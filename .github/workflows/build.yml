name: Build SignageOS Image

on:
  push:
    tags:
      - 'v*'          # triggers on v0.1.0, v1.2.3, etc
  workflow_dispatch:  # also lets you trigger a build manually from the GitHub UI

jobs:
  build-rpi:
    name: Build Raspberry Pi Image
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            debootstrap qemu-user-static binfmt-support \
            parted squashfs-tools dosfstools \
            grub-efi-amd64-bin mtools \
            curl wget xz-utils

      - name: Enable binfmt for arm64
        run: |
          sudo systemctl start systemd-binfmt || true
          ls /proc/sys/fs/binfmt_misc/

      - name: Add swap space (needed for arm64 chroot)
        run: |
          # GitHub runners already have a swapfile — turn it off, resize, turn back on
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Cache debootstrap tarball
        uses: actions/cache@v4
        with:
          path: .cache
          key: debootstrap-bookworm-arm64-v1

      - name: Build RPi image
        run: sudo ./scripts/build-image.sh rpi

      - name: Get version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Rename image with version
        run: |
          mv output/rpi/images/signaeos-rpi.img.xz \
             output/rpi/images/signaeos-rpi-${{ steps.version.outputs.version }}.img.xz

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: signaeos-rpi-${{ steps.version.outputs.version }}
          path: output/rpi/images/signaeos-rpi-${{ steps.version.outputs.version }}.img.xz
          retention-days: 30

  build-x86:
    name: Build x86_64 Image
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            debootstrap \
            parted squashfs-tools dosfstools \
            grub-efi-amd64-bin mtools \
            curl wget xz-utils git

      - name: Cache debootstrap tarball
        uses: actions/cache@v4
        with:
          path: .cache
          key: debootstrap-bookworm-amd64-v1

      - name: Build x86 image
        run: sudo ./scripts/build-image.sh x86

      - name: Get version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Rename image with version
        run: |
          xz -T0 output/x86/images/signaeos-x86.img
          mv output/x86/images/signaeos-x86.img.xz \
             output/x86/images/signaeos-x86-${{ steps.version.outputs.version }}.img.xz

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: signaeos-x86-${{ steps.version.outputs.version }}
          path: output/x86/images/signaeos-x86-${{ steps.version.outputs.version }}.img.xz
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [build-rpi, build-x86]
    # Only create a release when triggered by a tag, not a manual run
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download RPi image
        uses: actions/download-artifact@v4
        with:
          name: signaeos-rpi-${{ steps.version.outputs.version }}
          path: images/

      - name: Download x86 image
        uses: actions/download-artifact@v4
        with:
          name: signaeos-x86-${{ steps.version.outputs.version }}
          path: images/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: SignageOS ${{ steps.version.outputs.version }}
          body: |
            ## SignageOS ${{ steps.version.outputs.version }}

            ### Flash instructions

            **Raspberry Pi 4 / 5:**
            1. Download `signaeos-rpi-${{ steps.version.outputs.version }}.img.xz`
            2. Open Raspberry Pi Imager
            3. Choose OS → **Use custom image** → select the downloaded file
            4. Choose your SD card → Write

            **x86_64 (mini PC / NUC):**
            1. Download `signaeos-x86-${{ steps.version.outputs.version }}.img.xz`
            2. Flash to USB: `xzcat signaeos-x86-*.img.xz | sudo dd of=/dev/sdX bs=4M status=progress`
            3. Boot from USB (ensure UEFI boot enabled in BIOS)

            ### First boot
            Browse to **http://signaeos.local:3000** to configure URLs, WiFi, and Stream Deck settings.
          files: |
            images/signaeos-rpi-${{ steps.version.outputs.version }}.img.xz
            images/signaeos-x86-${{ steps.version.outputs.version }}.img.xz
          draft: false
          prerelease: false
