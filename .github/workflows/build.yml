name: Build SignageOS Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-rpi:
    name: Raspberry Pi Image (pi-gen)
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout SignageOS
        uses: actions/checkout@v4
        with:
          path: signaeos

      - name: Install pi-gen dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static debootstrap \
            zerofree zip dosfstools libarchive-tools libcap2-bin \
            grep rsync xz-utils file git curl bc gpg pigz xxd \
            arch-test binfmt-support

      - name: Register arm64 binfmt handler
        run: |
          sudo systemctl start binfmt-support || true
          sudo update-binfmts --enable qemu-aarch64 || true
          # Manually register if update-binfmts isn't enough
          if [ ! -f /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            echo ':qemu-aarch64:M::\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xb7\x00:\xff\xff\xff\xff\xff\xff\xff\x00\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/usr/bin/qemu-aarch64-static:F' \
              | sudo tee /proc/sys/fs/binfmt_misc/register
          fi
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64 | head -3
          # Verify arch-test works
          arch-test aarch64 && echo "aarch64 emulation OK" || echo "WARNING: aarch64 test failed"

      - name: Clone pi-gen
        run: git clone --depth=1 https://github.com/RPi-Distro/pi-gen.git pi-gen

      - name: Get version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(cd signaeos && git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Configure pi-gen
        run: |
          printf '%s\n' \
            'IMG_NAME="signaeos-rpi"' \
            'RELEASE="bookworm"' \
            'DEPLOY_COMPRESSION="xz"' \
            'DEPLOY_ZIP=0' \
            'LOCALE_DEFAULT="en_GB.UTF-8"' \
            'TARGET_HOSTNAME="signaeos"' \
            'KEYBOARD_KEYMAP="gb"' \
            'KEYBOARD_LAYOUT="English (UK)"' \
            'TIMEZONE_DEFAULT="UTC"' \
            'ENABLE_SSH=1' \
            'PUBKEY_SSH_FIRST_USER=""' \
            'FIRST_USER_NAME="signaeos"' \
            'FIRST_USER_PASS="signaeos"' \
            'DISABLE_FIRST_BOOT_USER_RENAME=1' \
            'WPA_COUNTRY="GB"' \
            > pi-gen/config
          echo "SIGNAEOS_VERSION=${{ steps.ver.outputs.version }}" >> pi-gen/config

      - name: Set up pi-gen stages
        run: |
          # Skip stages 3-5 (desktop etc) — we only want stage 2 (Lite) + our stages
          touch pi-gen/stage3/SKIP pi-gen/stage4/SKIP pi-gen/stage5/SKIP
          touch pi-gen/stage3/SKIP_IMAGES pi-gen/stage4/SKIP_IMAGES pi-gen/stage5/SKIP_IMAGES

          # Copy our stages into pi-gen
          cp -r signaeos/pi-gen-stage/. pi-gen/stage-signaeos/

          # Substitute version placeholder
          sed -i "s|@@SIGNAEOS_VERSION@@|${{ steps.ver.outputs.version }}|g" \
            pi-gen/stage-signaeos/01-signaeos-files/signaeos-install.sh

          # Make all run scripts executable
          find pi-gen/stage-signaeos -name "*.sh" -exec chmod +x {} \;

          # Verify structure
          ls -la pi-gen/stage-signaeos/

      - name: Add swap space
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Cache pi-gen build
        uses: actions/cache@v4
        with:
          path: pi-gen/work
          key: pi-gen-bookworm-${{ hashFiles('pi-gen/stage1/**', 'pi-gen/stage2/**') }}-v2

      - name: Build image
        run: |
          cd pi-gen
          sudo bash build.sh 2>&1 | tee build.log
          echo "--- Deploy dir ---"
          ls -lh deploy/

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: signaeos-rpi-${{ steps.ver.outputs.version }}
          path: pi-gen/deploy/*.xz
          retention-days: 30

  build-x86:
    name: x86_64 Image (debootstrap)
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            debootstrap parted squashfs-tools dosfstools \
            grub-efi-amd64-bin mtools curl wget xz-utils git

      - name: Add swap space
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Cache debootstrap
        uses: actions/cache@v4
        with:
          path: .cache
          key: debootstrap-bookworm-amd64-v2

      - name: Get version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build x86 image
        run: |
          # Substitute version
          sed -i "s|@@SIGNAEOS_VERSION@@|${{ steps.ver.outputs.version }}|g" \
            pi-gen-stage/01-signaeos-files/signaeos-install.sh
          sudo SIGNAEOS_VERSION="${{ steps.ver.outputs.version }}" \
            ./scripts/build-x86.sh

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: signaeos-x86-${{ steps.ver.outputs.version }}
          path: output/x86/images/*.xz
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-24.04
    needs: [build-rpi, build-x86]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Get version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: images/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: SignageOS ${{ steps.ver.outputs.version }}
          body: |
            ## SignageOS ${{ steps.ver.outputs.version }}

            **Dual display digital signage OS**
            - Display 1: Chromium/Firefox kiosk (URLs via Stream Deck)
            - Display 2: Native NDI viewer (sources via Stream Deck)
            - NDI Access Manager integration
            - 802.1q VLAN trunk support
            - Bitfocus Companion Satellite built-in
            - Web UI at `http://signaeos.local:3000`

            ### Flash — Raspberry Pi 4/5
            Open **Raspberry Pi Imager** → Use custom image → select `signaeos-rpi-*.img.xz`

            ### Flash — x86
            ```
            xzcat signaeos-x86-*.img.xz | sudo dd of=/dev/sdX bs=4M status=progress
            ```
          files: images/*.xz
          draft: false
          prerelease: false
