[core]
backend=drm-backend.so
shell=kiosk-shell.so
idle-time=0
repaint-window=8

# Display 1 — HDMI-A-1 (Web/Chromium)
[output]
name=HDMI-A-1
mode=1920x1080@60
transform=normal

# Display 2 — HDMI-A-2 (NDI)
# Comment out if using a single display
[output]
name=HDMI-A-2
mode=1920x1080@60
transform=normal

[keyboard]
keymap_rules=evdev
keymap_layout=gb
