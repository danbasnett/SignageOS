[core]
# DRM/KMS backend — uses the real GPU
backend=drm-backend.so
# Kiosk shell: fullscreen, no decorations, no taskbar
shell=kiosk-shell.so
# Never blank/lock the screen
idle-time=0
# Smooth rendering
repaint-window=8

[output]
name=HDMI-A-1
mode=1920x1080@60
transform=normal

# Uncomment to rotate display:
# transform=rotate-90

[keyboard]
keymap_rules=evdev
keymap_layout=gb
# Change to 'us' for US keyboard

[shell]
# Kiosk shell — single fullscreen app, no alt-tab, no close
